<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Grid Calculator — Glassmorphism Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="app-container">
        <header class="app-header">
            <div class="logo-row">
                <span class="logo-emoji">🧮</span>
                <div class="title-col">
                    <h1>Neon Grid Calculator</h1>
                    <p class="tagline">Fully functional calculator workspace with glowing neon interfaces.</p>
                </div>
            </div>
            <div class="badge">calculators</div>
        </header>

        <main class="workspace-card">
            
            <input type="text" id="calc-disp" readonly style="width: 100%; height: 50px; text-align: right; background: var(--bg-secondary); border: 1px solid var(--border); border-radius: 8px; color: #fff; font-size: 20px; padding: 8px; margin-bottom: 12px;">
            <div class="calc-grid">
                <button class="btn" onclick="press('7')">7</button>
                <button class="btn" onclick="press('8')">8</button>
                <button class="btn" onclick="press('9')">9</button>
                <button class="btn btn-secondary" onclick="press('/')">/</button>
                <button class="btn" onclick="press('4')">4</button>
                <button class="btn" onclick="press('5')">5</button>
                <button class="btn" onclick="press('6')">6</button>
                <button class="btn btn-secondary" onclick="press('*')">*</button>
                <button class="btn" onclick="press('1')">1</button>
                <button class="btn" onclick="press('2')">2</button>
                <button class="btn" onclick="press('3')">3</button>
                <button class="btn btn-secondary" onclick="press('-')">-</button>
                <button class="btn" onclick="press('0')">0</button>
                <button class="btn btn-secondary" onclick="clearCalc()">C</button>
                <button class="btn" onclick="evaluateCalc()">=</button>
                <button class="btn btn-secondary" onclick="press('+')">+</button>
            </div>
        
        </main>
        
        <footer class="app-footer">
            <p>Created as a premium portfolio piece by <a href="https://github.com/VARSHAN69" target="_blank">@VARSHAN69</a></p>
        </footer>
    </div>
    
    <script src="app.js"></script>
</body>
</html>
